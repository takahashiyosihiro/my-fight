<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Node Fighting Network Game</title>
    <style>
        body { background: #222; text-align: center; color: white; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        canvas { background: #000; border: 4px solid #444; display: block; margin: 0 auto; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h1 { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>NODE STREET FIGHTER</h1>
    <canvas id="c" width="800" height="400"></canvas>
    <div id="msg" style="margin-top:10px; font-weight:bold; color:orange;">接続中...</div>

    <script>
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");
        const msgDiv = document.getElementById("msg");
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + window.location.host);
        
        let state = null;
        ws.onmessage = (e) => {
            state = JSON.parse(e.data);
            if (state.type === 'init') {
                msgDiv.innerText = `あなたは ${state.role === 'SERVER' ? 'Player 1' : 'Player 2'} です！`;
            } else {
                draw();
            }
        };

        const keys = { 'KeyA':'A', 'KeyD':'D', 'KeyW':'W', 'KeyS':'S', 'Space':'SPACE', 'KeyR':'R', 'KeyQ':'PARRY', 'ShiftLeft':'SHIFT' };
        window.onkeydown = (e) => { if(keys[e.code]) ws.send(JSON.stringify({type:'input', key:keys[e.code], isDown:true})); };
        window.onkeyup = (e) => { if(keys[e.code]) ws.send(JSON.stringify({type:'input', key:keys[e.code], isDown:false})); };
        
        function draw() {
            ctx.clearRect(0, 0, 800, 400);
            ctx.fillStyle = "#222"; ctx.fillRect(0, 350, 800, 50); // 床

            [state.p1, state.p2].forEach((p, i) => {
                // プレイヤー描画
                ctx.fillStyle = p.isStunned ? "yellow" : (p.isParrying ? "cyan" : (i==0 ? "blue" : "green"));
                ctx.fillRect(p.x, p.y, 50, 100);
                
                // 攻撃中エフェクト
                if(p.isAttacking) { ctx.fillStyle="red"; ctx.fillRect(p.isFacingRight?p.x+50:p.x-40, p.y+20, 40, 20); }
                // 弾
                if(p.hasProjectile) { ctx.fillStyle=p.isStrongProj?"yellow":"cyan"; ctx.beginPath(); ctx.arc(p.projX+10, p.projY+10, p.isStrongProj?20:10, 0, 7); ctx.fill(); }
            });

            // UI描画
            ctx.fillStyle="red"; ctx.fillRect(50, 30, state.p1.hp*2, 20); ctx.fillRect(550, 30, state.p2.hp*2, 20);
            ctx.fillStyle="cyan"; ctx.fillRect(50, 60, state.p1.dashGauge, 10); ctx.fillRect(650, 60, state.p2.dashGauge, 10);
            
            ctx.font="20px Impact"; ctx.fillStyle="orange";
            if(state.p1.comboCount>1) ctx.fillText(state.p1.comboCount+" HIT!", 50, 90);
            if(state.p2.comboCount>1) ctx.fillText(state.p2.comboCount+" HIT!", 680, 90);
            
            ctx.fillStyle="white"; ctx.font="bold 28px Arial"; ctx.fillText(state.matchMessage, 400, 50);
            if(state.isGameOver) { ctx.fillStyle="rgba(0,0,0,0.6)"; ctx.fillRect(0,0,800,400); ctx.fillText("PRESS [ R ] TO RESTART", 400, 200); }
        }
    </script>
</body>
</html>
